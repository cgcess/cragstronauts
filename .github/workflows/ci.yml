name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    # Job-level env so the Fetch step's `if` can read it (step-level env is not
    # available to that step's own `if`). Empty on fork PRs (no secret access).
    env:
      ZEROVAULT_API_KEY: ${{ secrets.ZEROVAULT_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Pull build-time web vars from ZeroVault. Skipped on fork PRs (no secret
      # access) — the build tolerates missing vars, so the check still passes.
      - name: Fetch secrets
        if: ${{ env.ZEROVAULT_API_KEY != '' }}
        run: bin/fetch-secrets

      - run: pnpm turbo typecheck build

      - run: npx vitest run
