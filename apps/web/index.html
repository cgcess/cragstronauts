<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f1e8" />
    <title>Cragstronauts</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@500;600;700;800&family=Geist:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      SVG filter defs for the liquid-glass nav surfaces. Referenced from
      styles.css via `backdrop-filter: url(#glass-refraction)`. The <svg>
      itself has zero painted area — only the <defs> are used.

      Anatomy:
        <feTurbulence>      generates a fractal noise field
        <feDisplacementMap> uses that noise to warp the backdrop, giving
                            the lens-like refraction the "Liquid Glass"
                            spec calls property #2 (edge lensing). CSS
                            blur + saturate are layered on top of this
                            in @supports (see styles.css).

      Edge-only refraction (Apple-style "lens" glass):
        The displacement map is masked by a radial gradient so the
        center stays a flat #808080 (= zero displacement under fe-
        DisplacementMap's "channel - 0.5" math) and only the rim
        carries the noise. Net effect: clear lens in the middle,
        refraction concentrated at the edges — like a snow globe
        or Apple Liquid Glass widget.

      Tuning knobs (try them live in DevTools, then bake in):
        baseFrequency  ↑ tighter ripples (frosted) · ↓ broader waves (water)
        numOctaves     ↑ more complex noise        · ↓ smoother
        scale          ↑ stronger refraction       · ↓ subtler
        stdDeviation   ↑ more frost                · ↓ sharper
        edge-fade-grad ↑ stop offsets control how wide the clear
                         center zone is. Currently clear out to ~55%
                         of the radius, then fades to full noise at
                         100%. Move the middle stop closer to 100%
                         for a *thinner* refractive rim, closer to 0%
                         for a *thicker* one.

      IMPORTANT: blur + saturate live INSIDE this filter chain, not in
      the CSS `backdrop-filter`. Chromium silently attenuates SVG
      filters when chained with CSS filter functions on `backdrop-
      filter` (a bare `url(#x) blur(0)` already kills 80% of the
      displacement). So the CSS rule applies *only* `url(#...)` and
      this filter does the full blur + saturate + refraction.

      Browser support: Chromium + Firefox: solid. Safari: landed in
      ~iOS 18 / Safari 18. Anything older falls through the @supports
      check in styles.css and keeps the pure-CSS frosted treatment.
    -->
    <svg
      width="0"
      height="0"
      style="position: absolute; overflow: hidden;"
      aria-hidden="true"
      focusable="false"
    >
      <defs>
        <filter id="glass-refraction" x="0%" y="0%" width="100%" height="100%">
          <!-- 1. Full-strength fractal noise across the whole filter region. -->
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.015 0.018"
            numOctaves="2"
            seed="7"
            result="noise"
          />

          <!--
            2. Edge-fade alpha mask loaded as an image via feImage. White
               at the rim, fully transparent at the center.

               *Why a data URI and not a same-document <symbol> ref?*
               feImage's `href="#fragment"` to a local <symbol>/<g> is
               flaky cross-browser — Chromium silently returned an empty
               image in our testing, which made the whole noise vanish.
               A data-URI'd inline SVG is reliable.

               Decoded form of the data URI for readability:
                 <svg viewBox="0 0 100 100" preserveAspectRatio="none">
                   <defs>
                     <radialGradient id="g" cx="50" cy="50" r="60"
                                     gradientUnits="userSpaceOnUse">
                       <stop offset="0"    stop-color="white"
                                           stop-opacity="0"/>
                       <stop offset="0.55" stop-color="white"
                                           stop-opacity="0"/>
                       <stop offset="1"    stop-color="white"
                                           stop-opacity="1"/>
                     </radialGradient>
                   </defs>
                   <rect width="100" height="100" fill="url(#g)"/>
                 </svg>

               The middle stop (0.55) controls how wide the clear center
               zone is. Push it toward 1 for a thinner refractive rim,
               toward 0 for a thicker one.
          -->
          <feImage
            href="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%20preserveAspectRatio%3D%22none%22%3E%3Cdefs%3E%3CradialGradient%20id%3D%22g%22%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2260%22%20gradientUnits%3D%22userSpaceOnUse%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22white%22%20stop-opacity%3D%220%22%2F%3E%3Cstop%20offset%3D%220.55%22%20stop-color%3D%22white%22%20stop-opacity%3D%220%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22white%22%20stop-opacity%3D%221%22%2F%3E%3C%2FradialGradient%3E%3C%2Fdefs%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20fill%3D%22url(%23g)%22%2F%3E%3C%2Fsvg%3E"
            x="0%"
            y="0%"
            width="100%"
            height="100%"
            preserveAspectRatio="none"
            result="edgeMask"
          />

          <!-- 3. Mask the noise: noise survives only where edgeMask alpha
                  is non-zero (i.e. near the rim). Center becomes
                  transparent. -->
          <feComposite in="noise" in2="edgeMask" operator="in" result="edgeNoise" />

          <!-- 4. Composite the edge-noise OVER a uniform gray fill. Gray
                  (#808080) maps to "zero displacement" inside
                  feDisplacementMap, so the center of the resulting map
                  is perfectly clear and the rim carries the noise. -->
          <feFlood flood-color="#808080" result="grayBase" />
          <feComposite in="edgeNoise" in2="grayBase" operator="over" result="displaceMap" />

          <!-- 5. Apply displacement using the edge-weighted map. -->
          <feDisplacementMap
            in="SourceGraphic"
            in2="displaceMap"
            scale="18"
            xChannelSelector="R"
            yChannelSelector="G"
            result="displaced"
          />

          <!-- 6. Light blur + saturation pop. -->
          <feGaussianBlur in="displaced" stdDeviation="2" result="blurred" />
          <feColorMatrix in="blurred" type="saturate" values="1.8" />
        </filter>
      </defs>
    </svg>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
